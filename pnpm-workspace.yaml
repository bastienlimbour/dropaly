    "next-themes": ^0.4.6
    "sonner": ^2.0.7
    "tailwindcss": ^4.3.0
    "@tailwindcss/vite": ^4.3.0
minimumReleaseAgeExclude:
  - '@ai-sdk/gateway@3.0.125'
  - '@ai-sdk/react@3.0.199'
  - '@tanstack/react-router@1.170.12'
  - '@tanstack/router-core@1.171.10'
