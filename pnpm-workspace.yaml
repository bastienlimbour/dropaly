packages:
  - apps/*
  - packages/*
allowBuilds:
  esbuild: true
  lefthook: true
  msgpackr-extract: true
  msw: true
  sharp: true
verifyDepsBeforeRun: false
minimumReleaseAge: 1440
minimumReleaseAgeStrict: true
catalogs:
  tooling:
    "typescript": 6.0.3
    "oxfmt": 0.57.0
    "oxlint": 1.72.0
    "oxlint-tsgolint": 0.24.0
    "tsx": ^4.22.4
    "vitest": ^4.1.9
  runtime:
    "dotenv": ^17.4.2
    "@t3-oss/env-core": ^0.13.1
    "zod": ^4.4.3
    "@types/node": ^24.13.2
  ai:
    "ai": ^7.0.8
    "@ai-sdk/react": ^4.0.9
    "@ai-sdk/gateway": ^4.0.6
    "@ai-sdk/google": ^4.0.3
    "@ai-sdk/devtools": ^1.0.1
  auth:
    "better-auth": ^1.6.23
    "@better-auth/expo": ^1.6.23
    "@polar-sh/better-auth": ^1.8.4
    "@polar-sh/sdk": ^0.47.1
  db:
    "drizzle-orm": ^0.45.2
    "drizzle-kit": ^0.31.10
    "drizzle-zod": ^0.8.3
    "pg": ^8.22.0
    "@types/pg": ^8.20.0
  react:
    # Keep React fixed to 19.2.3 for Expo compatibility
    "react": 19.2.3
    "react-dom": 19.2.3
    "@types/react": ~19.2.17
    "@types/react-dom": ~19.2.3
  native:
    # Keep React Native fixed to 0.85.* for Expo compatibility
    "react-native": 0.85.3
    "react-native-reanimated": 4.3.1
    "react-native-svg": 15.15.4
    "react-native-worklets": 0.8.3
    "uniwind": ^1.9.0
  tanstack:
    "@tanstack/react-form": ^1.33.0
    "@tanstack/react-query": ^5.101.2
    "@tanstack/react-query-devtools": ^5.101.2
    "@tanstack/react-router": ^1.170.16
    "@tanstack/react-router-devtools": ^1.167.0
    "@tanstack/router-plugin": ^1.168.18
  ui:
    "tailwindcss": ^4.3.2
    "@tailwindcss/vite": ^4.3.2
    "class-variance-authority": ^0.7.1
    "next-themes": ^0.4.6
    "sonner": ^2.0.7
    "@tabler/icons-react": "^3.44.0"
    "@tabler/icons-react-native": "^3.44.0"
peerDependencyRules:
  allowedVersions:
    "openapi-typescript>typescript": "6.0.3"
minimumReleaseAgeExclude:
  - "@ai-sdk/devtools@1.0.1"
  - "@ai-sdk/gateway@4.0.6"
  - "@ai-sdk/google@4.0.3"
  - "@ai-sdk/mcp@2.0.4"
  - "@ai-sdk/provider-utils@5.0.2"
  - "@ai-sdk/provider@4.0.1"
  - "@ai-sdk/react@4.0.9"
  - "@better-auth/core@1.6.23"
