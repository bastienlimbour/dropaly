    "@types/react-dom": ~19.2.3
    "react": 19.2.7
    "react-dom": 19.2.7
  tanstack:
    "@tanstack/react-form": ^1.33.0
    "@tanstack/react-query": ^5.101.0
    "@tanstack/react-query-devtools": ^5.101.0
    "@tanstack/react-router": ^1.170.12
    "@tanstack/react-router-devtools": ^1.167.0
