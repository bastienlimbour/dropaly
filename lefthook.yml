pre-commit:
  parallel: true
  commands:
    openapi-check:
      priority: 1
      run: pnpm openapi:check
    typecheck:
      priority: 2
      run: pnpm typecheck
    lint:
      priority: 2
      run: pnpm lint
    format:
      priority: 2
      run: pnpm format:check
    test:
      priority: 2
      run: pnpm test
