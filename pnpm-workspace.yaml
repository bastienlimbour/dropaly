  "@types/node": ^22.19.20
  "oxfmt": ^0.53.0
  "oxlint": ^1.68.0
  "typescript": ^5.9.3
  "vitest": ^4.1.8
  "zod": ^4.4.3
catalogs:
  ai:
    "@ai-sdk/devtools": ^0.0.18
    "@ai-sdk/google": ^3.0.80
    "@ai-sdk/react": ^3.0.199
    "ai": ^6.0.197
  auth:
    "@better-auth/expo": ^1.6.14
    "@polar-sh/better-auth": ^1.8.4
    "@polar-sh/sdk": ^0.47.0
    "better-auth": ^1.6.14
  db:
    "@types/pg": ^8.20.0
    "drizzle-kit": ^0.31.10
    "drizzle-orm": ^0.45.2
    "drizzle-zod": ^0.8.3
    "pg": ^8.21.0
  react:
